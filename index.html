<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Chikki ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fecfef);
}

.page{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transition:0.5s;
}

.hidden{
display:none;
}

h1{
font-size:48px;
color:white;
margin-bottom:20px;
}

h2{
font-size:34px;
color:white;
margin-bottom:40px;
font-weight:bold;
}

.card{
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
width:90%;
max-width:550px;
position:relative;
}

.card h1{
color:#ff4f81;
font-size:35px;
margin-bottom:30px;
}

button{
padding:14px 30px;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
transition:.3s;
}

#continueBtn{
background:#ff4f81;
color:white;
}

#yesBtn{
background:#ff4f81;
color:white;
margin-right:20px;
}

#noBtn{
background:#eee;
color:#ff4f81;
position:relative;
}

#page3 h1{
font-size:36px;
width:90%;
max-width:650px;
line-height:1.5;
}

.heart{
position:fixed;
bottom:-40px;
font-size:28px;
animation:float linear forwards;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-110vh) scale(1.8);
opacity:0;
}
}
</style>
</head>

<body>

<!-- PAGE 1 -->

<div id="page1" class="page">

<h1>Hi Chikki ❤️</h1>

<h2><strong>I have a question for you...</strong></h2>

<button id="continueBtn">Continue</button>

</div>

<!-- PAGE 2 -->

<div id="page2" class="page hidden">

<div class="card">

<h1>Will you go on a date with me? 🥹</h1>

<button id="yesBtn">❤️ Yes</button>

<button id="noBtn">😅 No</button>

</div>

</div>

<!-- PAGE 3 -->

<div id="page3" class="page hidden">

<h1>
❤️ Thank you for saying yes. Now I have something special planned just for us. ❤️✨
</h1>

</div>

<script>

const page1=document.getElementById("page1");
const page2=document.getElementById("page2");
const page3=document.getElementById("page3");

document.getElementById("continueBtn").onclick=function(){
page1.classList.add("hidden");
page2.classList.remove("hidden");
};

document.getElementById("yesBtn").onclick=function(){

page2.classList.add("hidden");
page3.classList.remove("hidden");

setInterval(createHeart,200);

};

const noBtn=document.getElementById("noBtn");

function moveButton(){

const card=document.querySelector(".card");

const rect=card.getBoundingClientRect();

const minX=rect.left-60;
const maxX=rect.right-100+60;

const minY=rect.top-40;
const maxY=rect.bottom-60+40;

const x=Math.random()*(maxX-minX)+minX;
const y=Math.random()*(maxY-minY)+minY;

noBtn.style.position="fixed";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("click",moveButton);

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

</script>

</body>
</html>
