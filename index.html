<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Question For You ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

.card{
background:rgba(255,255,255,0.2);
padding:30px;
border-radius:20px;
text-align:center;
backdrop-filter:blur(10px);
color:white;
max-width:400px;
}

button{
padding:12px 24px;
margin:10px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:white;
color:#ff4d6d;
position:relative;
}

.hidden{
display:none;
}

.heart{
position:fixed;
font-size:24px;
animation:float 4s linear forwards;
}

@keyframes float{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-100vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="card" id="page1">
<h1>A Question For You ❤️</h1>
<p style="margin:20px 0;">Will you go on a date with me? 🥹</p>

<button id="yes" onclick="yesClicked()">Yes ❤️</button>
<button id="no">No 😅</button>
</div>

<div class="card hidden" id="page2">
<h1>Yay! ❤️</h1>
<p>You've made me the happiest person today! 🥰</p>
</div>

<script>
const noBtn=document.getElementById("no");

function moveButton(){
const x=Math.random()*(window.innerWidth-120);
const y=Math.random()*(window.innerHeight-60);
noBtn.style.position="fixed";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("click",moveButton);

function yesClicked(){
document.getElementById("page1").classList.add("hidden");
document.getElementById("page2").classList.remove("hidden");

for(let i=0;i<50;i++){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.top="100vh";
heart.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);
}
}
</script>

</body>
</html>
