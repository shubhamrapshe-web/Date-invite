<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ A Question For You ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.container{
text-align:center;
color:white;
padding:20px;
}

.card{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:350px;
}

h1{
margin-bottom:20px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
margin:10px;
transition:.3s;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:white;
color:#ff4d6d;
position:relative;
}

.hidden{
display:none;
}

#message{
font-size:24px;
font-weight:bold;
}

.heart{
position:absolute;
font-size:24px;
animation:float 4s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}
</style>

</head>

<body>

<div class="container">

<div id="page1" class="card">
<h1>Hey Nikita ❤️<br><br>I have a question for you...</h1>
<button onclick="nextPage()">Continue</button>
</div>

<div id="page2" class="card hidden">
<h1>Will you go on a date with me? 🥺❤️</h1>

<button id="yes" onclick="yesClicked()">Yes ❤️</button>

<button id="no">No 😅</button>

</div>

<div id="page3" class="card hidden">
<h1>🎉 You just made me the happiest person! ❤️</h1>

<p style="margin-top:20px;font-size:20px;">
Thank you for saying yes.<br><br>
Now I have something special planned just for us. ❤️
</p>

</div>

</div>

<script>

function nextPage(){
document.getElementById("page1").classList.add("hidden");
document.getElementById("page2").classList.remove("hidden");
}

const noBtn=document.getElementById("no");

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("click",moveButton);

function moveButton(){

let x=Math.random()*(window.innerWidth-120);

let y=Math.random()*(window.innerHeight-80);

noBtn.style.position="fixed";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

}

function yesClicked(){

document.getElementById("page2").classList.add("hidden");

document.getElementById("page3").classList.remove("hidden");

for(let i=0;i<60;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.className="heart";

heart.style.left=Math.random()*100+"vw";

heart.style.top="100vh";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

}

</script>

</body>
</html>
